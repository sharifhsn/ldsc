<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ldsc-rs — LD Score Regression in the browser</title>
    <meta name="description" content="Run the ldsc-rs heritability + LD-score pipeline in your browser. Pure-Rust WASM port of Bulik-Sullivan et al.">

    <!-- COOP / COEP polyfill so SharedArrayBuffer (and thus
         multi-threaded WASM via wasm-bindgen-rayon) works on GitHub
         Pages. The bundled wasm in v1 doesn't actually use
         SharedArrayBuffer (multi-threaded WASM was attempted in
         Workstream C.3 but reverted — see plan), so this script is
         currently a no-op. Kept in place so re-enabling C.3 in a
         future iteration only requires flipping a Cargo.toml dep
         back on. -->
    <script src="coi-serviceworker.min.js"></script>

    <!-- chrome.css — hand-rolled minimal subset replacing the full
         227 KB bootstrap.min.css. Same `--bs-*` token names so
         palette.css overrides keep working. Covers exactly the
         classes ldsc-web uses: cards, buttons, basic forms, col-sm-6
         grid, spacing + flex + text utilities, progress bar. ~12 KB
         raw (~3 KB gzipped on the wire). If a new component needs a
         Bootstrap class we don't have, add it to chrome.css rather
         than reintroducing the full bundle. -->
    <link data-trunk rel="copy-file" href="assets/chrome.css" />
    <link rel="stylesheet" href="chrome.css">

    <!-- LDLink-derived palette overrides + custom component CSS
         (file-row, stat-grid, perf-breakdown, mobile media-query
         block). Loaded AFTER chrome.css so these rules win. -->
    <link data-trunk rel="copy-file" href="assets/palette.css" />
    <link rel="stylesheet" href="palette.css">

    <!-- coi-serviceworker is referenced via the script tag above; we
         also need to copy it into dist/. -->
    <link data-trunk rel="copy-file" href="assets/coi-serviceworker.min.js" />

    <!-- Web Worker shim that runs the same wasm bundle inside a
         Worker context, where FileReaderSync is available for
         streaming chunked reads off a Blob-backed BED. The main
         thread spawns this with `new Worker('worker.js', { type:
         'module' })` and posts the wasm bundle URLs to it (hash-
         suffixed by trunk so a hard-coded path would 404). -->
    <link data-trunk rel="copy-file" href="assets/worker.js" />

    <!-- Inner Web Worker for the manual SAB-backed parallel GEMM
         pool (workstream G). One nested Worker spawned per rayon
         thread inside each outer compute Worker; shares the outer
         Worker's wasm linear memory via SharedArrayBuffer. See
         `assets/inner_worker.js` for the full lifecycle. -->
    <link data-trunk rel="copy-file" href="assets/inner_worker.js" />

    <!-- Preprint PDF, iframed by the Preprint tab and rendered
         by the browser's built-in PDF viewer (PDFium on Chrome/
         Edge, pdf.js on Firefox, PDFKit on Safari). 2 MB, loaded
         only when the user visits the tab. Regenerated by
         preprint/scripts/build_web_artifact.sh (which just runs
         `typst compile` and copies the result here). -->
    <link data-trunk rel="copy-file" href="assets/preprint.pdf" />

    <!-- Compile + bundle the ldsc-web crate. data-bin selects this
         binary in case the workspace ever has more than one.
         data-wasm-opt-params:
         - --enable-threads: permits `(memory ... shared)` and the
           atomic.* opcodes (workstream G enables those via
           .cargo/config.toml).
         - --enable-simd: required even though +simd128 is in
           rustflags — wasm-opt won't lower v128 ops without it.
         - --enable-relaxed-simd: permits `f32x4.relaxed_madd` (FMA
           used by our 4×4 GEMM microkernel for ~1.6× speedup on
           small-m shapes). Without this, wasm-opt strips relaxed
           ops and the kernel falls back to scalar tail.
         - --enable-bulk-memory / --enable-nontrapping-float-to-int:
           required by LLVM 20+ codegen (Rust 1.87+). Passing them
           explicitly avoids spurious validation errors on toolchain
           drift.
         - --converge: re-run passes until a fixed point. Costs
           build time, saves 1-5% more on bundle size.
         - --low-memory-unused: lets wasm-opt assume the first 1024
           bytes of linear memory are unused, enabling more aggressive
           constant folding into load/store offsets. Rust's allocator
           respects this; safe with --shared-memory / --import-memory.
         - --strip-debug / --strip-producers: drop debug info sections
           and the "produced by Rust X / wasm-bindgen Y" metadata.
         - --vacuum: already implied by -Oz but explicit for clarity. -->
    <link data-trunk rel="rust" data-bin="ldsc-web" data-wasm-opt="z"
          data-wasm-opt-params="--enable-threads --enable-simd --enable-relaxed-simd --enable-bulk-memory --enable-nontrapping-float-to-int --converge --low-memory-unused --strip-debug --strip-producers --vacuum" />
</head>
<body>
    <!-- Leptos mounts the entire UI here at startup. Until the wasm
         bundle finishes downloading + initializing (~1-3 MB on first
         visit, cached afterwards), the placeholder below renders. -->
    <div id="app-root">
        <div class="bootstrapping">Loading ldsc-rs…</div>
    </div>
</body>
</html>
