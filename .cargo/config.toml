# bed-reader 1.0.6 → pyo3 0.22 → fails to detect Python 3.14+.
# This flag instructs pyo3 to build against the stable ABI regardless.
[env]
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"

# NOTE: Do NOT add target-cpu=native here. faer does runtime CPU feature
# detection and target-cpu=native causes 2-4x regression in matmul
# (tested 2026-03-07: bb_dot 10.8→40.3s, ab_dot 35→68.5s).
#
# +avx2,+fma is safe: gives 256-bit SIMD for our code without triggering
# AVX-512 (which is what caused the native regression on EPYC 7R13).
# faer uses runtime feature detection so its matmul kernels are unaffected.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+avx2,+fma"]
